name: Signed release APK

on:
  push:
    branches: ['**']
    tags: ['v*']
  workflow_dispatch:
    inputs:
      publish_tag:
        description: Optional release tag, for example v0.1.0
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore release signing key
        shell: bash
        run: |
          set -euo pipefail
          test -n "$ANDROID_KEYSTORE_BASE64"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/tv-launcher-release.jks"
          {
            printf 'storeFile=%s\n' "$RUNNER_TEMP/tv-launcher-release.jks"
            printf 'storePassword=%s\n' "$ANDROID_KEYSTORE_PASSWORD"
            printf 'keyAlias=%s\n' "$ANDROID_KEY_ALIAS"
            printf 'keyPassword=%s\n' "$ANDROID_KEY_PASSWORD"
          } > keystore.properties

      - name: Test, lint and build signed release
        run: ./gradlew --no-daemon :app:testReleaseUnitTest :app:lintRelease :app:assembleRelease

      - name: Verify and name APK
        id: apk
        shell: bash
        run: |
          set -euo pipefail
          source_apk="$(find app/build/outputs/apk/release -maxdepth 1 -name '*.apk' -type f -print -quit)"
          test -n "$source_apk"
          version_name="$(sed -n "s/.*versionName '\([^']*\)'.*/\1/p" app/build.gradle)"
          target_apk="TVLauncher-${version_name}.apk"
          cp "$source_apk" "$target_apk"
          apksigner verify --verbose --print-certs "$target_apk"
          printf 'path=%s\n' "$target_apk" >> "$GITHUB_OUTPUT"

      - name: Publish direct APK release asset
        if: startsWith(github.ref, 'refs/tags/v') || inputs.publish_tag != ''
        shell: bash
        env:
          REQUESTED_TAG: ${{ inputs.publish_tag }}
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
          else
            tag="$REQUESTED_TAG"
          fi
          apk="${{ steps.apk.outputs.path }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$apk" --clobber
          else
            gh release create "$tag" "$apk" --target "$GITHUB_SHA" --title "TV Launcher $tag" --generate-notes
          fi
